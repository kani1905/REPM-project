<!DOCTYPE html>
<html>

<head>
    <title>Settings - REPM</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
        else document.documentElement.classList.remove("dark");
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="flex h-screen bg-gray-50 dark:bg-gray-900 dark:text-white overflow-hidden text-base">

    <!-- ===== SIDEBAR ===== -->
    <aside class="w-64 h-screen bg-blue-900 dark:bg-gray-900 text-white flex flex-col justify-between shadow-2xl flex-shrink-0 z-50">
        <div class="overflow-y-auto">
            <div class="p-6 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-400 rounded-xl flex items-center justify-center text-blue-900 font-bold text-lg shadow-lg shadow-yellow-500/20">⚡</div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">REPM</h1>
                        <p class="text-blue-200 text-[10px] uppercase tracking-widest font-bold opacity-70">Energy Monitor</p>
                    </div>
                </div>
            </div>

            <ul class="space-y-1 px-3 py-4">
                <li><a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">🏠 <span>Dashboard</span></a></li>
                <li><a href="input.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">➕ <span>Add Data</span></a></li>
                <li><a href="analytics.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">📊 <span>Analytics</span></a></li>
                <li><a href="notifications.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10 relative">🔔 <span>Notifications</span> <span id="notifBadge" class="hidden ml-auto bg-red-500 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center border-2 border-blue-800">!</span></a></li>
                <li><a href="settings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-white/20 font-bold shadow-inner">⚙️ <span>Settings</span></a></li>
            </ul>
        </div>
        <div class="p-4 border-t border-white/10">
            <button onclick="logout()" class="w-full bg-red-500/80 hover:bg-red-500 py-3 rounded-xl text-center font-bold transition-all shadow-lg shadow-red-900/20">🚪 Logout</button>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col overflow-y-auto">

    <!-- MAIN -->
    <div class="flex-1 flex">
        <!-- LEFT SETTINGS MENU -->
        <div class="w-64 bg-white dark:bg-gray-800 border-r dark:border-gray-700 p-6 space-y-4">
            <h2 class="text-xl font-bold">Settings</h2>
            <button onclick="openTab('profile')" class="block w-full text-left py-2">👤 Profile</button>
            <button onclick="openTab('theme')" class="block w-full text-left py-2">🎨 Theme</button>
            <button onclick="openTab('password')" class="block w-full text-left py-2">🔐 Change Password</button>
            <button onclick="openTab('about')" class="block w-full text-left py-2">ℹ About</button>
        </div>

        <!-- RIGHT CONTENT -->
        <div class="flex-1 p-10">

            <!-- PROFILE -->
            <div id="profile" class="tab-content">
                <h2 class="text-2xl font-bold mb-6">Profile</h2>
                <div class="flex items-center gap-6 mb-6">
                    <img id="profileImg" src="https://ui-avatars.com/api/?name=User"
                        class="w-24 h-24 rounded-full object-cover border">
                    <form id="uploadForm">
                        <input type="file" id="profileFile" name="file" class="mb-2 text-black dark:text-white">
                        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Upload</button>
                    </form>
                </div>
                <form id="profileForm" class="space-y-4 max-w-md">
                    <input type="text" id="usernameField" name="username" placeholder="Username"
                        class="w-full p-3 border rounded text-black dark:text-white dark:bg-gray-700">
                    <input type="email" id="emailField" name="email" placeholder="Email"
                        class="w-full p-3 border rounded text-black dark:text-white dark:bg-gray-700">
                    <button type="submit" class="bg-blue-900 text-white px-6 py-2 rounded">Save Changes</button>
                </form>
            </div>

            <!-- THEME -->
            <div id="theme" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-6">Theme Settings</h2>
                <div class="flex gap-4">
                    <button onclick="setLight()" class="px-4 py-2 bg-blue-500 text-white rounded">☀ Light Mode</button>
                    <button onclick="setDark()" class="px-4 py-2 bg-gray-800 text-white rounded">🌙 Dark Mode</button>
                </div>
            </div>

            <!-- PASSWORD -->
            <div id="password" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-6">Change Password</h2>
                <form id="passwordForm" class="space-y-4 max-w-md">
                    <input type="password" id="newPassword" placeholder="New Password"
                        class="w-full p-3 border rounded text-black dark:text-white dark:bg-gray-700">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password"
                        class="w-full p-3 border rounded text-black dark:text-white dark:bg-gray-700">
                    <button type="submit" class="bg-green-600 text-white px-5 py-2 rounded">Update Password</button>
                </form>
            </div>

            <!-- ABOUT -->
            <div id="about" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">About</h2>
                <p><b>REPM</b> - Renewable Energy Performance Monitor</p>
                <p>📧 support@repm.com</p>
                <p>Version 1.0</p>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://repm-project-production.up.railway.app';

        function openTab(tabName) {
            document.querySelectorAll(".tab-content").forEach(el => el.classList.add("hidden"));
            document.getElementById(tabName).classList.remove("hidden");
        }
        openTab('profile');

        function setLight() { localStorage.setItem("theme", "light"); document.documentElement.classList.remove("dark"); }
        function setDark() { localStorage.setItem("theme", "dark"); document.documentElement.classList.add("dark"); }

        
        function toggleDropdown() { document.getElementById("dropdownMenu").classList.toggle("hidden"); }
        window.onclick = function(e) { if (!e.target.closest('.relative')) document.getElementById("dropdownMenu")?.classList.add("hidden"); };
        
        async function logout() {
            await fetch(`${API}/logout`, { method: 'POST', credentials: 'include' });
            window.location.href = '../login.html';
        }

        async function loadProfile() {
            try {
                const res = await fetch(`${API}/user/settings`, { credentials: 'include' });
                if (res.status === 401) { window.location.href = '../login.html'; return; }
                const data = await res.json();
                document.getElementById('usernameField').value = data.username || '';
                document.getElementById('emailField').value = data.email || '';
                if (data.profileImage) {
                    document.getElementById('profileImg').src = `${API}/uploads/${data.profileImage}`;
                }
            } catch (e) { console.error(e); }
        }

        document.getElementById('profileForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            try {
                const res = await fetch(`${API}/user/settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email: document.getElementById('emailField').value })
                });
                const data = await res.json();
                alert(data.message || 'Settings updated');
            } catch (e) { alert('Error saving settings'); }
        });

        document.getElementById('uploadForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const file = document.getElementById('profileFile').files[0];
            if (!file) return;
            const form = new FormData();
            form.append('file', file);
            try {
                const res = await fetch(`${API}/user/upload-profile`, {
                    method: 'POST', credentials: 'include', body: form
                });
                const data = await res.json();
                if (res.ok) { alert('Profile updated!'); loadProfile(); }
                else { alert('Upload failed'); }
            } catch (e) { alert('Error uploading'); }
        });

        document.getElementById('passwordForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;
            if (newPwd !== confirmPwd) { alert('Passwords do not match'); return; }
            try {
                const res = await fetch(`${API}/user/settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ password: newPwd })
                });
                const data = await res.json();
                alert(data.message || 'Password updated');
            } catch (e) { alert('Error updating password'); }
        });

        loadProfile();
    </script>
</body>

</html>
