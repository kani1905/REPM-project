<head>
    <title>Notifications - REPM</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
        else document.documentElement.classList.remove("dark");
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="flex h-screen bg-gray-50 dark:bg-gray-900 dark:text-white overflow-hidden text-base">

    <!-- ===== SIDEBAR ===== -->
    <aside class="w-64 h-screen bg-blue-900 dark:bg-gray-900 text-white flex flex-col justify-between shadow-2xl flex-shrink-0 z-50">
        <div class="overflow-y-auto">
            <div class="p-6 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-400 rounded-xl flex items-center justify-center text-blue-900 font-bold text-lg shadow-lg shadow-yellow-500/20">⚡</div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">REPM</h1>
                        <p class="text-blue-200 text-[10px] uppercase tracking-widest font-bold opacity-70">Energy Monitor</p>
                    </div>
                </div>
            </div>

            <ul class="space-y-1 px-3 py-4">
                <li><a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">🏠 <span>Dashboard</span></a></li>
                <li><a href="input.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">➕ <span>Add Data</span></a></li>
                <li><a href="analytics.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">📊 <span>Analytics</span></a></li>
                <li><a href="notifications.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-white/20 font-bold shadow-inner relative">🔔 <span>Notifications</span> <span id="notifBadge" class="hidden ml-auto bg-red-500 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center border-2 border-blue-800">!</span></a></li>
                <li><a href="settings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">⚙️ <span>Settings</span></a></li>
            </ul>
        </div>
        <div class="p-4 border-t border-white/10">
            <button onclick="logout()" class="w-full bg-red-500/80 hover:bg-red-500 py-3 rounded-xl text-center font-bold transition-all shadow-lg shadow-red-900/20">🚪 Logout</button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 px-8 py-4 flex items-center justify-between shadow-sm flex-shrink-0">
            <div>
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white">🔔 Notifications</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400">Manage your energy alerts and administrator messages</p>
            </div>
        </header>

        <main class="p-8 space-y-6">
            <div class="flex gap-4">
                <button id="btnAuto" class="px-6 py-3 rounded-xl font-bold shadow-lg transition-all bg-red-500 text-white" onclick="switchTab('AUTO', this)">⚡ Auto Alerts</button>
                <button id="btnAdmin" class="px-6 py-3 rounded-xl font-bold shadow-lg transition-all bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400 hover:bg-blue-500 hover:text-white" onclick="switchTab('ADMIN_TO_USER', this)">👤 Admin Messages</button>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border dark:border-gray-700 p-8">
                <h3 id="sectionHeader" class="text-lg font-bold mb-6 text-red-500">⚡ System Generated Alerts</h3>
                <div id="notifContainer" class="space-y-4">
                    <p class="text-center py-10 text-gray-400">Loading alerts...</p>
                </div>
            </div>
        </main>
    </div>

<script>
const API = 'https://repm-project-production.up.railway.app';
let currentType = 'AUTO';

async function logout() {
    await fetch(`${API}/logout`, { credentials: 'include', method: 'POST' });
    window.location.href = '../login.html';
}

function switchTab(type, el) {
    currentType = type;
    
    // UI Update
    const btnAuto = document.getElementById('btnAuto');
    const btnAdmin = document.getElementById('btnAdmin');
    const header = document.getElementById('sectionHeader');

    if (type === 'AUTO') {
        btnAuto.className = "px-6 py-3 rounded-xl font-bold shadow-lg transition-all bg-red-500 text-white";
        btnAdmin.className = "px-6 py-3 rounded-xl font-bold shadow-lg transition-all bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400 hover:bg-blue-500 hover:text-white";
        header.innerHTML = '⚡ System Generated Alerts';
        header.className = 'text-lg font-bold mb-6 text-red-500';
    } else {
        btnAdmin.className = "px-6 py-3 rounded-xl font-bold shadow-lg transition-all bg-blue-600 text-white";
        btnAuto.className = "px-6 py-3 rounded-xl font-bold shadow-lg transition-all bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400 hover:bg-red-500 hover:text-white";
        header.innerHTML = '👤 Messages from Administrator';
        header.className = 'text-lg font-bold mb-6 text-blue-600';
    }
    
    fetchNotifications();
}

async function fetchNotifications() {
    const container = document.getElementById('notifContainer');
    try {
        const res = await fetch(`${API}/user/notifications/inbox`, { credentials: 'include' });
        const data = await res.json();
        
        const filtered = data.filter(n => {
            if (currentType === 'AUTO') return n.type === 'AUTO';
            return n.type === 'ADMIN_TO_USER' || n.type === 'ADMIN';
        });

        if (filtered.length === 0) {
            container.innerHTML = `<p class="text-center py-10 text-gray-400 italic">No ${currentType === 'AUTO' ? 'alerts' : 'messages'} found.</p>`;
            return;
        }

        container.innerHTML = filtered.map(n => {
            let icon = '⚡';
            let colorClass = 'border-red-500';
            let isActionable = false;

            if (n.message.toLowerCase().includes('excellent') || n.message.toLowerCase().includes('great')) {
                icon = '✅';
                colorClass = 'border-green-500';
            }
            if (n.type.includes('ADMIN')) {
                colorClass = 'border-blue-500';
                icon = '👤';
                isActionable = true;
            }
            
            return `
                <div class="p-6 bg-gray-50 dark:bg-gray-700/30 rounded-2xl border-l-4 ${colorClass} shadow-sm transition-all hover:shadow-md">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="flex items-center gap-3">
                            <span class="text-xl p-2 bg-white dark:bg-gray-800 rounded-lg shadow-sm">${icon}</span>
                            <div>
                                <span class="font-bold text-gray-800 dark:text-white block">${n.message}</span>
                                <span class="text-[10px] text-gray-400 uppercase font-black tracking-widest mt-1 block">
                                    ${n.source} • ${new Date(n.timestamp).toLocaleString()}
                                </span>
                            </div>
                        </div>
                        ${isActionable ? `
                            <button onclick="toggleReply(${n.id})" class="px-4 py-2 bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition-all">
                                💬 Reply
                            </button>
                        ` : ''}
                    </div>

                    <!-- Reply Form (Hidden) -->
                    <div id="replyBox-${n.id}" class="hidden mt-6 pt-6 border-t border-blue-50 dark:border-gray-700 animate-in slide-in-from-top-2 duration-300">
                        <textarea id="replyText-${n.id}" placeholder="Type your response to administrator..." 
                                  class="w-full p-4 bg-white dark:bg-gray-800 border dark:border-gray-600 rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all" rows="3"></textarea>
                        <div class="flex justify-end mt-3 gap-3">
                            <button onclick="toggleReply(${n.id})" class="px-4 py-2 text-gray-400 text-xs font-bold">Cancel</button>
                            <button onclick="sendReply(${n.id})" class="px-6 py-2 bg-blue-600 text-white rounded-xl text-xs font-bold shadow-lg shadow-blue-600/20 hover:scale-105 transition-all">Send Reply</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

    } catch (e) {
        container.innerHTML = '<p class="text-center py-10 text-red-500 font-bold">Error loading notifications. Please try again.</p>';
    }
}

function toggleReply(id) {
    const box = document.getElementById(`replyBox-${id}`);
    box.classList.toggle('hidden');
}

async function sendReply(parentId) {
    const text = document.getElementById(`replyText-${parentId}`).value;
    if (!text) return alert('Please enter a message');

    try {
        const res = await fetch(`${API}/user/notifications/reply`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ parentId, message: text })
        });
        if (res.ok) {
            alert('Reply sent to Administrator');
            toggleReply(parentId);
            document.getElementById(`replyText-${parentId}`).value = '';
        }
    } catch (e) { alert('Failed to send reply'); }
}

fetchNotifications();
</script>

</body>
</html>
