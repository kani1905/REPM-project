<!DOCTYPE html>
<html>
<head>
    <title>Notifications - REPM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        } else {
            document.documentElement.classList.remove("dark");
        }
    </script>
    <meta charset="UTF-8">
</head>

<body class="flex min-h-screen bg-blue-50 dark:bg-gray-900 dark:text-white">

<!-- SIDEBAR -->
<aside class="w-64 bg-gradient-to-b from-blue-900 to-blue-700 dark:from-gray-800 dark:to-gray-900 text-white flex flex-col justify-between shadow-xl">
    <div>
        <h2 class="text-2xl font-bold p-6 tracking-wide">⚡ REPM</h2>
        <ul class="space-y-3 px-4">
            <li><a href="dashboard.html" class="block hover:bg-white hover:text-blue-900 px-4 py-3 rounded-lg transition">🏠 Dashboard</a></li>
            <li><a href="input.html" class="block hover:bg-white hover:text-blue-900 px-4 py-3 rounded-lg transition">➕ Add Data</a></li>
            <li><a href="analytics.html" class="block hover:bg-white hover:text-blue-900 px-4 py-3 rounded-lg transition">📊 Analytics</a></li>
            <li><a href="notifications.html" class="block bg-white text-blue-900 font-semibold px-4 py-3 rounded-lg shadow">🔔 Notifications</a></li>
            <li><a href="settings.html" class="block hover:bg-white hover:text-blue-900 px-4 py-3 rounded-lg transition">⚙ Settings</a></li>
        </ul>
    </div>
    <div class="p-5">
        <button onclick="logout()" class="w-full block bg-red-600 hover:bg-red-700 py-3 rounded-lg text-center font-semibold shadow">🚪 Logout</button>
    </div>
</aside>

<!-- MAIN -->
<div class="flex-1 p-8">
    <h1 class="text-3xl font-bold mb-8">🔔 Notifications</h1>

    <div class="flex gap-4 mb-6">
        <button onclick="showTab('auto')" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg shadow transition">⚡ Auto Alerts</button>
        <button onclick="showTab('admin')" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg shadow transition">👨‍💼 Admin Messages</button>
    </div>

    <div id="auto" class="tab bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg">
        <h2 class="text-xl font-bold text-red-600 mb-5">⚡ System Generated Alerts</h2>
        <div id="autoList"><p class="text-gray-500">Loading...</p></div>
    </div>

    <div id="admin" class="tab hidden bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg mt-4">
        <h2 class="text-xl font-bold text-blue-700 mb-5">👨‍💼 Messages from Admin</h2>
        <div id="adminList"><p class="text-gray-500">Loading...</p></div>
    </div>
</div>

<script>
const API = 'http://localhost:8080';

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
    document.getElementById(tab).classList.remove('hidden');
}

async function logout() {
    await fetch(`${API}/logout`, { method: 'POST', credentials: 'include' });
    window.location.href = '../login.html';
}

function formatNotification(n, colorClass) {
    const time = n.timestamp ? new Date(n.timestamp).toLocaleString() : '';
    return `<div class="border-l-4 ${colorClass} bg-opacity-10 p-5 mb-4 rounded-lg shadow-sm hover:shadow-md transition">
        <p class="font-semibold text-lg">${n.message}</p>
        <div class="text-sm text-gray-600 dark:text-gray-300 mt-2">Source: ${n.source} | ${time}</div>
    </div>`;
}

async function loadNotifications() {
    try {
        const res = await fetch(`${API}/user/notifications`, { credentials: 'include' });
        if (res.status === 401) { window.location.href = '../login.html'; return; }
        const data = await res.json();

        const autoList = document.getElementById('autoList');
        const adminList = document.getElementById('adminList');

        if (!data.autoNotifications || data.autoNotifications.length === 0) {
            autoList.innerHTML = '<p class="text-gray-500">No system alerts yet.</p>';
        } else {
            autoList.innerHTML = data.autoNotifications.map(n => formatNotification(n, 'border-red-500')).join('');
        }

        if (!data.adminNotifications || data.adminNotifications.length === 0) {
            adminList.innerHTML = '<p class="text-gray-500">No admin messages yet.</p>';
        } else {
            adminList.innerHTML = data.adminNotifications.map(n => formatNotification(n, 'border-blue-500')).join('');
        }
    } catch(e) {
        console.error('Error loading notifications:', e);
    }
}

loadNotifications();
</script>

</body>
</html>
