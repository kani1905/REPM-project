<!DOCTYPE html>
<html lang="en">

<head>
    <title>Reset Password - REPM</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: #d6f0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #ffffff;
            padding: 48px 44px;
            border-radius: 18px;
            width: 420px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.10);
        }

        .icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 12px;
        }

        h2 {
            text-align: center;
            color: #1e3c72;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        p.subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .username-badge {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e3c72;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 18px;
        }

        .pass-wrapper {
            position: relative;
            margin-bottom: 14px;
        }

        .field {
            width: 100%;
            padding: 14px 44px 14px 16px;
            border: 1.5px solid #d0d7de;
            border-radius: 8px;
            font-size: 15px;
            color: #333;
            font-family: 'Inter', Arial, sans-serif;
            transition: border-color 0.2s;
        }

        .field:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.08);
        }

        .field::placeholder {
            color: #a0aab4;
        }

        .eye {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #8a9ab5;
            user-select: none;
        }

        .strength-bar {
            height: 4px;
            border-radius: 4px;
            background: #e5e7eb;
            margin-bottom: 14px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 4px;
            transition: all 0.3s;
            width: 0;
        }

        .strength-text {
            font-size: 12px;
            text-align: right;
            margin-bottom: 12px;
            margin-top: -10px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', Arial, sans-serif;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background: #163061;
            transform: translateY(-1px);
        }

        .links {
            text-align: center;
            margin-top: 22px;
        }

        .links a {
            color: #1e3c72;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .msg {
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 14px;
            display: none;
            font-weight: 500;
        }

        .msg.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .msg.success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="icon">🔑</div>
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your new password below.</p>

        <div id="userBadge" class="username-badge" style="display:none;"></div>
        <div id="msgBox" class="msg"></div>

        <form id="resetForm">
            <div class="pass-wrapper">
                <input class="field" type="password" id="password" placeholder="New password" required
                    oninput="checkStrength()">
                <span class="eye" onclick="togglePass('password', 'eye1')" id="eye1">👁</span>
            </div>
            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
            <div class="strength-text" id="strengthText"></div>

            <div class="pass-wrapper">
                <input class="field" type="password" id="confirmPassword" placeholder="Confirm new password" required>
                <span class="eye" onclick="togglePass('confirmPassword', 'eye2')" id="eye2">👁</span>
            </div>

            <button class="btn" type="submit" id="submitBtn">Update Password</button>
        </form>

        <div class="links">
            <a href="login.html">← Back to Login</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('username');

        if (username) {
            const badge = document.getElementById('userBadge');
            badge.textContent = '👤 Resetting password for: ' + username;
            badge.style.display = 'block';
        } else {
            showMsg('No username found in URL. Please go back and try again.', 'error');
        }

        function togglePass(id) {
            const p = document.getElementById(id);
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function checkStrength() {
            const val = document.getElementById('password').value;
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');
            let score = 0;
            if (val.length >= 6) score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { label: '', color: '', width: '0%' },
                { label: 'Very Weak', color: '#ef4444', width: '20%' },
                { label: 'Weak', color: '#f97316', width: '40%' },
                { label: 'Fair', color: '#eab308', width: '60%' },
                { label: 'Strong', color: '#22c55e', width: '80%' },
                { label: 'Very Strong', color: '#16a34a', width: '100%' }
            ];
            const l = levels[score] || levels[0];
            fill.style.width = l.width;
            fill.style.background = l.color;
            text.textContent = l.label;
            text.style.color = l.color;
        }

        function showMsg(text, type) {
            const box = document.getElementById('msgBox');
            box.textContent = text;
            box.className = 'msg ' + type;
            box.style.display = 'block';
        }

        document.getElementById('resetForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            if (!username) { showMsg('No username in URL.', 'error'); return; }

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                showMsg('Passwords do not match!', 'error');
                return;
            }
            if (password.length < 6) {
                showMsg('Password must be at least 6 characters.', 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Updating...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    showMsg('✅ Password updated! Redirecting to login...', 'success');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    showMsg(data.message || 'Error updating password', 'error');
                    btn.textContent = 'Update Password';
                    btn.disabled = false;
                }
            } catch (error) {
                showMsg('Cannot connect to server. Make sure backend is running.', 'error');
                btn.textContent = 'Update Password';
                btn.disabled = false;
            }
        });
    </script>

</body>

</html>
