<!DOCTYPE html>
<html>
<head>
    <title>Manage Users - REPM Admin</title>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex h-screen bg-gray-50 dark:bg-gray-900 dark:text-white overflow-hidden text-base">

    <!-- ===== SIDEBAR ===== -->
    <aside class="w-64 h-screen bg-blue-900 dark:bg-gray-900 text-white flex flex-col justify-between shadow-2xl flex-shrink-0 z-50">
        <div class="overflow-y-auto">
            <div class="p-6 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-400 rounded-xl flex items-center justify-center text-blue-900 font-bold text-lg shadow-lg shadow-yellow-500/20">⚡</div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">REPM</h1>
                        <p class="text-blue-200 text-[10px] uppercase tracking-widest font-bold opacity-70">Energy Monitor</p>
                    </div>
                </div>
            </div>

            <ul class="space-y-1 px-3 py-4">
                <li><a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">🏠 <span>Dashboard</span></a></li>
                <li><a href="analytics.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">📊 <span>Analytics</span></a></li>
                <li><a href="users.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-white/20 font-bold shadow-inner">👥 <span>Users</span></a></li>
                <li><a href="leaderboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">🏆 <span>Leaderboard</span></a></li>
                <li><a href="notifications.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">🔔 <span>Notifications</span></a></li>
                <li><a href="settings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">⚙️ <span>Settings</span></a></li>
            </ul>
        </div>
        <div class="p-4 border-t border-white/10">
            <button onclick="logout()" class="w-full bg-red-500/80 hover:bg-red-500 py-3 rounded-xl text-center font-bold transition-all shadow-lg shadow-red-900/20">🚪 Logout</button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 px-8 py-5 flex items-center justify-between shadow-sm flex-shrink-0 z-40">
            <div>
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white">👥 User Directory</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400">View and manage registered platform profiles</p>
            </div>
            <button onclick="location.reload()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl transition-all">🔄</button>
        </header>

        <main class="flex-1 overflow-y-auto p-8 space-y-10 custom-scrollbar">
            
            <!-- Registered Users Table -->
            <section class="bg-white dark:bg-gray-800 rounded-[2.5rem] shadow-xl shadow-gray-200/50 dark:shadow-none border border-gray-100 dark:border-gray-700 overflow-hidden">
                <div class="p-8 border-b dark:border-gray-700 flex justify-between items-center bg-gray-50/50 dark:bg-gray-800/50">
                    <h2 class="text-xl font-black text-gray-800 dark:text-white uppercase tracking-tight">👥 Platform Members</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 dark:bg-gray-900/50 text-gray-400 uppercase text-[10px] font-black tracking-widest">
                            <tr>
                                <th class="p-6">ID</th>
                                <th class="p-6">Full Name</th>
                                <th class="p-6">Contact Details</th>
                                <th class="p-6">Action</th>
                            </tr>
                        </thead>
                        <tbody id="userRows" class="divide-y dark:divide-gray-700">
                            <tr><td colspan="4" class="p-12 text-center text-gray-400 italic">Loading users...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>

    <!-- Modal for User Detail -->
    <div id="detailModal" class="fixed inset-0 bg-blue-900/40 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-900 w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden animate-in">
            <div id="modalContent" class="p-10"></div>
        </div>
    </div>

    <script>
        const API = 'https://repm-project-production.up.railway.app';

        async function logout() {
            await fetch(`${API}/logout`, { credentials: 'include', method: 'POST' });
            window.location.href = '../login.html';
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API}/admin/users`, { credentials: 'include' });
                if (res.status === 401 || res.status === 403) { window.location.href = '../login.html'; return; }
                const users = await res.json();
                const tbody = document.getElementById('userRows');
                const registeredUsers = users.filter(u => u.role === 'USER');

                if (!registeredUsers || registeredUsers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-12 text-center text-gray-400">No users found.</td></tr>';
                    return;
                }

                tbody.innerHTML = registeredUsers.map(u => `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-all border-b border-gray-100 dark:border-gray-800">
                    <td class="p-6 text-gray-400 font-black text-xs">#${u.id}</td>
                    <td class="p-6">
                        <div class="font-black text-gray-800 dark:text-white">@${u.username}</div>
                        <div class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">${u.fullName || 'Anonymous'}</div>
                    </td>
                    <td class="p-6">
                        <div class="text-sm font-bold text-gray-700 dark:text-gray-300">${u.email}</div>
                        <div class="text-[10px] text-gray-400 font-medium">${u.phone || 'No phone'}</div>
                    </td>
                    <td class="p-6">
                        <button onclick="viewDetails(${u.id})" class="px-4 py-2 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">🔍 View Details</button>
                    </td>
                </tr>`).join('');
            } catch(e) { console.error('Error loading users:', e); }
        }

        async function viewDetails(userId) {
            const res = await fetch(`${API}/admin/users`, { credentials: 'include' });
            const users = await res.json();
            const u = users.find(user => user.id === userId);
            if (!u) return;

            document.getElementById('modalContent').innerHTML = `
                <div class="space-y-8">
                    <div class="flex items-center gap-6">
                        <div class="w-20 h-20 bg-blue-900 text-white rounded-3xl flex items-center justify-center text-3xl font-black shadow-xl shadow-blue-900/20">
                            ${u.username.charAt(0).toUpperCase()}
                        </div>
                        <div>
                            <h3 class="text-2xl font-black text-gray-900 dark:text-white">@${u.username}</h3>
                            <p class="text-blue-600 font-bold uppercase tracking-widest text-xs">${u.fullName || 'Registered User'}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-5 bg-gray-50 dark:bg-gray-800 rounded-3xl border border-gray-100 dark:border-gray-700">
                            <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Email</p>
                            <p class="text-sm font-bold truncate">${u.email}</p>
                        </div>
                        <div class="p-5 bg-gray-50 dark:bg-gray-800 rounded-3xl border border-gray-100 dark:border-gray-700">
                            <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Phone</p>
                            <p class="text-sm font-bold">${u.phone || 'N/A'}</p>
                        </div>
                    </div>
                    <div class="p-5 bg-gray-50 dark:bg-gray-800 rounded-3xl border border-gray-100 dark:border-gray-700">
                        <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Address</p>
                        <p class="text-sm font-bold">${u.address || 'No address provided.'}</p>
                    </div>
                    <div class="flex gap-4 pt-4">
                        <button onclick="closeModal()" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-blue-900/20">Close Profile</button>
                    </div>
                </div>
            `;
            document.getElementById('detailModal').classList.remove('hidden');
            document.getElementById('detailModal').classList.add('flex');
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); document.getElementById('detailModal').classList.remove('flex'); }

        loadUsers();
    </script>
</body>
</html>
