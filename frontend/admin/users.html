<!DOCTYPE html>
<html>
<head>
    <title>Manage Users - REPM Admin</title>
    <meta charset="UTF-8">
    <style>
        body { margin:0; font-family:Arial,sans-serif; background:#e0f7fa; display:flex; }
        .sidebar { position:fixed; top:0; left:0; width:220px; height:100%; background:#1e3c72; color:white; display:flex; flex-direction:column; padding:20px 0; }
        .sidebar a { color:white; padding:15px 25px; margin:5px 0; border-radius:6px; transition:background 0.3s; text-decoration:none; display:block; font-weight:bold; }
        .sidebar a:hover, .sidebar a.active { background:rgba(255,255,255,0.2); }
        .sidebar h2 { text-align:center; margin-bottom:30px; }
        .main { margin-left:240px; padding:40px; flex:1; }
        .box { background:white; padding:30px; border-radius:12px; margin-bottom:20px; box-shadow:0 5px 30px rgba(0,0,0,0.2); }
        table { width:100%; border-collapse:collapse; }
        th,td { padding:12px 15px; border-bottom:1px solid #ddd; text-align:left; }
        th { background:#1e3c72; color:white; }
        tr:hover { background:#f5f5f5; }
        input, select { padding:8px 12px; border:1px solid #ccc; border-radius:6px; }
        button.btn { background:#1e3c72; color:white; border:none; padding:8px 14px; border-radius:6px; cursor:pointer; }
        button.btn-alert { background:#e53935; color:white; border:none; padding:8px 14px; border-radius:6px; cursor:pointer; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>⚡ REPM</h2>
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="analytics.html">📊 Analytics</a>
    <a href="users.html" class="active">👥 Users</a>
    <a href="leaderboard.html">🏆 Leaderboard</a>
    <a href="notifications.html">🔔 Notifications</a>
    <a href="settings.html">⚙ Settings</a>
    <a href="#" onclick="logout()" style="margin-top:auto; background:#ef4444;">🚪 Logout</a>
</div>

<div class="main">
    <div class="box">
        <h2>👥 Manage Users</h2>
        <table id="usersTable">
            <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Action</th></tr></thead>
            <tbody id="userRows"><tr><td colspan="5">Loading...</td></tr></tbody>
        </table>
    </div>

    <div class="box">
        <h2>📢 Send Notification to User</h2>
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
            <div>
                <label>User ID</label><br>
                <input type="number" id="notifUserId" placeholder="User ID">
            </div>
            <div>
                <label>Source</label><br>
                <select id="notifSource">
                    <option value="Solar">Solar</option>
                    <option value="Wind">Wind</option>
                    <option value="Hydro">Hydro</option>
                </select>
            </div>
            <div style="flex:1;">
                <label>Message</label><br>
                <input type="text" id="notifMessage" placeholder="Enter message" style="width:100%;">
            </div>
            <button class="btn" onclick="sendNotif()">Send</button>
        </div>
    </div>
</div>

<script>
const API = 'https://repm-project-production.up.railway.app';

async function logout() {
    await fetch(`${API}/logout`, { credentials: 'include', method: 'POST', credentials: 'include' });
    window.location.href = '../login.html';
}

async function loadUsers() {
    try {
        const res = await fetch(`${API}/admin/users`, { credentials: 'include', credentials: 'include' });
        if (res.status === 401 || res.status === 403) { window.location.href = '../login.html'; return; }
        const users = await res.json();
        const tbody = document.getElementById('userRows');
        if (!users || users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5">No users found.</td></tr>';
            return;
        }
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${u.id}</td>
                <td>${u.username}</td>
                <td>${u.email || '-'}</td>
                <td>${u.role}</td>
                <td>
                    <button class="btn-alert" onclick="sendAlert(${u.id}, '${u.username}')">⚠ Alert</button>
                </td>
            </tr>`).join('');
    } catch(e) { console.error('Error loading users:', e); }
}

async function sendAlert(userId, username) {
    const message = prompt(`Enter alert message for ${username}:`, 'Please check your energy usage');
    if (!message) return;
    const source = prompt('Enter source (Solar/Wind/Hydro):', 'Solar');
    if (!source) return;
    try {
        const res = await fetch(`${API}/admin/send-alert`, { credentials: 'include',
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ userId, message, source })
        });
        const data = await res.json();
        alert(data.message || 'Alert sent');
    } catch(e) { alert('Error sending alert'); }
}

async function sendNotif() {
    const userId = document.getElementById('notifUserId').value;
    const message = document.getElementById('notifMessage').value;
    const source = document.getElementById('notifSource').value;
    if (!userId || !message) { alert('Please fill all fields'); return; }
    try {
        const res = await fetch(`${API}/admin/notify`, { credentials: 'include',
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ userId, message, source })
        });
        const data = await res.json();
        alert(data.message || 'Sent!');
    } catch(e) { alert('Error sending notification'); }
}

loadUsers();
</script>
</body>
</html>
