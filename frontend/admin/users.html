<!DOCTYPE html>
<html>
<head>
    <title>Manage Users - REPM Admin</title>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex h-screen bg-gray-50 dark:bg-gray-900 dark:text-white overflow-hidden text-sm">

    <!-- ===== SIDEBAR ===== -->
    <aside class="w-64 h-screen bg-gradient-to-b from-blue-900 via-blue-800 to-blue-700 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 text-white flex flex-col justify-between shadow-2xl flex-shrink-0 z-50">
        <div class="overflow-y-auto">
            <div class="p-6 border-b border-blue-700/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-400 rounded-xl flex items-center justify-center text-blue-900 font-bold text-lg shadow-lg shadow-yellow-500/20">⚡</div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">REPM</h1>
                        <p class="text-blue-200 text-[10px] uppercase tracking-widest font-bold opacity-70">Energy Monitor</p>
                    </div>
                </div>
            </div>

            <ul class="space-y-1 px-3 py-4">
                <li><a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">🏠 <span>Dashboard</span></a></li>
                <li><a href="analytics.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">📊 <span>Analytics</span></a></li>
                <li><a href="users.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-white/20 font-bold shadow-inner">👥 <span>Users</span></a></li>
                <li><a href="leaderboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">🏆 <span>Leaderboard</span></a></li>
                <li><a href="notifications.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">🔔 <span>Notifications</span></a></li>
                <li><a href="settings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">⚙️ <span>Settings</span></a></li>
            </ul>
        </div>
        <div class="p-4 border-t border-blue-700/30">
            <button onclick="logout()" class="w-full bg-red-500/80 hover:bg-red-500 py-3 rounded-xl text-center font-bold transition-all shadow-lg shadow-red-900/20">🚪 Logout</button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 px-8 py-4 flex items-center justify-between shadow-sm flex-shrink-0">
            <div>
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white">👥 User Management</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400">View and manage all registered platform users</p>
            </div>
        </header>

        <main class="p-8 space-y-8">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border dark:border-gray-700 overflow-hidden">
                <div class="p-6 border-b dark:border-gray-700 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-gray-800 dark:text-white">👥 Registered Users</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 dark:bg-gray-700 text-gray-500 uppercase text-[10px] font-bold">
                            <tr>
                                <th class="p-4">ID</th>
                                <th class="p-4">Username</th>
                                <th class="p-4">Email</th>
                                <th class="p-4">Role</th>
                                <th class="p-4">Action</th>
                            </tr>
                        </thead>
                        <tbody id="userRows" class="divide-y dark:divide-gray-700">
                            <tr><td colspan="5" class="p-8 text-center text-gray-400">Loading users...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-sm border dark:border-gray-700">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-blue-600">📢 Direct Notification</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-2">User ID</label>
                        <input type="number" id="notifUserId" placeholder="User ID" class="w-full p-3 bg-gray-50 dark:bg-gray-700 border dark:border-gray-600 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Source</label>
                        <select id="notifSource" class="w-full p-3 bg-gray-50 dark:bg-gray-700 border dark:border-gray-600 rounded-xl">
                            <option value="Solar">Solar</option>
                            <option value="Wind">Wind</option>
                            <option value="Hydro">Hydro</option>
                        </select>
                    </div>
                    <div class="md:col-span-1">
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Message</label>
                        <input type="text" id="notifMessage" placeholder="Enter message" class="w-full p-3 bg-gray-50 dark:bg-gray-700 border dark:border-gray-600 rounded-xl">
                    </div>
                    <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg shadow-blue-900/20" onclick="sendNotif()">Send Now</button>
                </div>
            </div>
        </main>
    </div>

<script>
const API = 'https://repm-project-production.up.railway.app';

async function logout() {
    await fetch(`${API}/logout`, { credentials: 'include', method: 'POST', credentials: 'include' });
    window.location.href = '../login.html';
}

async function loadUsers() {
    try {
        const res = await fetch(`${API}/admin/users`, { credentials: 'include', credentials: 'include' });
        if (res.status === 401 || res.status === 403) { window.location.href = '../login.html'; return; }
        const users = await res.json();
        const tbody = document.getElementById('userRows');
        if (!users || users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5">No users found.</td></tr>';
            return;
        }
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${u.id}</td>
                <td>${u.username}</td>
                <td>${u.email || '-'}</td>
                <td>${u.role}</td>
                <td>
                    <button class="btn-alert" onclick="sendAlert(${u.id}, '${u.username}')">⚠ Alert</button>
                </td>
            </tr>`).join('');
    } catch(e) { console.error('Error loading users:', e); }
}

async function sendAlert(userId, username) {
    const message = prompt(`Enter alert message for ${username}:`, 'Please check your energy usage');
    if (!message) return;
    const source = prompt('Enter source (Solar/Wind/Hydro):', 'Solar');
    if (!source) return;
    try {
        const res = await fetch(`${API}/admin/send-alert`, { credentials: 'include',
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ userId, message, source })
        });
        const data = await res.json();
        alert(data.message || 'Alert sent');
    } catch(e) { alert('Error sending alert'); }
}

async function sendNotif() {
    const userId = document.getElementById('notifUserId').value;
    const message = document.getElementById('notifMessage').value;
    const source = document.getElementById('notifSource').value;
    if (!userId || !message) { alert('Please fill all fields'); return; }
    try {
        const res = await fetch(`${API}/admin/notify`, { credentials: 'include',
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ userId, message, source })
        });
        const data = await res.json();
        alert(data.message || 'Sent!');
    } catch(e) { alert('Error sending notification'); }
}

loadUsers();
</script>
</body>
</html>
