<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard - REPM Admin</title>
    <meta charset="UTF-8">
    <style>
        body { margin:0; font-family:Arial,sans-serif; background:#e0f7fa; display:flex; }
        .sidebar { position:fixed; top:0; left:0; width:220px; height:100%; background:#1e3c72; color:white; display:flex; flex-direction:column; padding:20px 0; }
        .sidebar a { color:white; padding:15px 25px; margin:5px 0; border-radius:6px; text-decoration:none; display:block; font-weight:bold; }
        .sidebar a:hover, .sidebar a.active { background:rgba(255,255,255,0.2); }
        .sidebar h2 { text-align:center; margin-bottom:30px; }
        .main { margin-left:240px; padding:40px; flex:1; }
        .box { background:white; padding:30px; border-radius:12px; margin-bottom:20px; box-shadow:0 5px 30px rgba(0,0,0,0.2); }
        .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
        table { width:100%; border-collapse:collapse; }
        th,td { padding:10px 15px; border-bottom:1px solid #ddd; }
        th { background:#1e3c72; color:white; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>⚡ REPM</h2>
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="analytics.html">📊 Analytics</a>
    <a href="users.html">👥 Users</a>
    <a href="leaderboard.html" class="active">🏆 Leaderboard</a>
    <a href="notifications.html">🔔 Notifications</a>
    <a href="settings.html">⚙ Settings</a>
    <a href="#" onclick="logout()" style="margin-top:auto; background:#ef4444;">🚪 Logout</a>
</div>

<div class="main">
    <h2>🏆 Leaderboard</h2>
    <div class="grid3">
        <div class="box">
            <h3>☀ Solar Leaders</h3>
            <table><thead><tr><th>#</th><th>Username</th><th>Efficiency</th></tr></thead>
            <tbody id="solarList"><tr><td colspan="3">Loading...</td></tr></tbody></table>
        </div>
        <div class="box">
            <h3>💨 Wind Leaders</h3>
            <table><thead><tr><th>#</th><th>Username</th><th>Efficiency</th></tr></thead>
            <tbody id="windList"><tr><td colspan="3">Loading...</td></tr></tbody></table>
        </div>
        <div class="box">
            <h3>💧 Hydro Leaders</h3>
            <table><thead><tr><th>#</th><th>Username</th><th>Efficiency</th></tr></thead>
            <tbody id="hydroList"><tr><td colspan="3">Loading...</td></tr></tbody></table>
        </div>
    </div>
</div>

<script>
const API = 'https://repm-project-production.up.railway.app';

async function logout() {
    await fetch(`${API}/logout`, { method: 'POST', credentials: 'include' });
    window.location.href = '../login.html';
}

function renderLeaders(list, elementId) {
    const tbody = document.getElementById(elementId);
    if (!list || list.length === 0) { tbody.innerHTML = '<tr><td colspan="3">No data</td></tr>'; return; }
    tbody.innerHTML = list.map((u, i) => `<tr><td>${i+1}</td><td>${u.username}</td><td>${(u.efficiency||0).toFixed(2)}%</td></tr>`).join('');
}

async function loadLeaderboard() {
    try {
        const res = await fetch(`${API}/admin/leaderboard`, { credentials: 'include' });
        if (res.status === 401 || res.status === 403) { window.location.href = '../login.html'; return; }
        const d = await res.json();
        renderLeaders(d.solarLeaders, 'solarList');
        renderLeaders(d.windLeaders, 'windList');
        renderLeaders(d.hydroLeaders, 'hydroList');
    } catch(e) { console.error('Error loading leaderboard:', e); }
}

loadLeaderboard();
</script>
</body>
</html>
