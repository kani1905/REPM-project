<!DOCTYPE html>
<html>
<head>
    <title>Admin Settings - REPM</title>
    <meta charset="UTF-8">
    <style>
        body { margin:0; font-family:Arial,sans-serif; background:#e0f7fa; display:flex; }
        .sidebar { position:fixed; top:0; left:0; width:220px; height:100%; background:#1e3c72; color:white; display:flex; flex-direction:column; padding:20px 0; }
        .sidebar a { color:white; padding:15px 25px; margin:5px 0; border-radius:6px; text-decoration:none; display:block; font-weight:bold; }
        .sidebar a:hover, .sidebar a.active { background:rgba(255,255,255,0.2); }
        .sidebar h2 { text-align:center; margin-bottom:30px; }
        .main { margin-left:240px; padding:40px; flex:1; }
        .box { background:white; padding:30px; border-radius:12px; margin-bottom:20px; box-shadow:0 5px 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>⚡ REPM</h2>
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="analytics.html">📊 Analytics</a>
    <a href="users.html">👥 Users</a>
    <a href="leaderboard.html">🏆 Leaderboard</a>
    <a href="notifications.html">🔔 Notifications</a>
    <a href="settings.html" class="active">⚙ Settings</a>
    <a href="#" onclick="logout()" style="margin-top:auto; background:#ef4444;">🚪 Logout</a>
</div>

<div class="main">
    <div class="box">
        <h2>⚙ Admin Settings</h2>
        <p>Logged in as: <b id="adminName">Loading...</b></p>
        <br>
        <h3>ℹ About REPM</h3>
        <p><b>REPM</b> - Renewable Energy Performance Monitor v1.0</p>
        <p>📧 support@repm.com</p>
    </div>
</div>

<script>
const API = 'http://localhost:8080';

async function logout() {
    await fetch(`${API}/logout`, { method: 'POST', credentials: 'include' });
    window.location.href = '../login.html';
}

async function loadSettings() {
    try {
        const res = await fetch(`${API}/admin/settings`, { credentials: 'include' });
        if (res.status === 401 || res.status === 403) { window.location.href = '../login.html'; return; }
        const data = await res.json();
        document.getElementById('adminName').textContent = data.username || 'Admin';
    } catch(e) { console.error(e); }
}

loadSettings();
</script>
</body>
</html>
