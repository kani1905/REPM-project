<!DOCTYPE html>
<html>
<head>
    <title>Analytics - REPM Admin</title>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin:0; font-family:Arial,sans-serif; background:#e0f7fa; display:flex; }
        .sidebar { position:fixed; top:0; left:0; width:220px; height:100%; background:#1e3c72; color:white; display:flex; flex-direction:column; padding:20px 0; }
        .sidebar a { color:white; padding:15px 25px; margin:5px 0; border-radius:6px; text-decoration:none; display:block; font-weight:bold; }
        .sidebar a:hover, .sidebar a.active { background:rgba(255,255,255,0.2); }
        .sidebar h2 { text-align:center; margin-bottom:30px; }
        .main { margin-left:240px; padding:40px; flex:1; }
        .box { background:white; padding:30px; border-radius:12px; margin-bottom:20px; box-shadow:0 5px 30px rgba(0,0,0,0.2); }
        table { width:100%; border-collapse:collapse; }
        th,td { padding:10px 15px; border-bottom:1px solid #ddd; text-align:left; }
        th { background:#1e3c72; color:white; }
        input,select { padding:8px 12px; border:1px solid #ccc; border-radius:6px; }
        button.btn { background:#1e3c72; color:white; border:none; padding:8px 14px; border-radius:6px; cursor:pointer; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>⚡ REPM</h2>
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="analytics.html" class="active">📊 Analytics</a>
    <a href="users.html">👥 Users</a>
    <a href="leaderboard.html">🏆 Leaderboard</a>
    <a href="notifications.html">🔔 Notifications</a>
    <a href="settings.html">⚙ Settings</a>
    <a href="#" onclick="logout()" style="margin-top:auto; background:#ef4444;">🚪 Logout</a>
</div>

<div class="main">
    <div class="box">
        <h2>📊 All Energy Data</h2>
        <div style="margin-bottom:15px; display:flex; gap:10px; align-items:flex-end;">
            <div>
                <label>ID to Update:</label><br>
                <input type="number" id="updateId" placeholder="Entry ID">
            </div>
            <div>
                <label>Produced (kWh):</label><br>
                <input type="number" step="0.01" id="updateProduced" placeholder="Produced">
            </div>
            <div>
                <label>Consumed (kWh):</label><br>
                <input type="number" step="0.01" id="updateConsumed" placeholder="Consumed">
            </div>
            <button class="btn" onclick="updateData()">Update</button>
        </div>
        <table id="analyticsTable">
            <thead><tr><th>ID</th><th>User</th><th>Source</th><th>Produced</th><th>Consumed</th><th>Efficiency</th><th>Bill</th><th>Date</th></tr></thead>
            <tbody id="analyticsRows"><tr><td colspan="8">Loading...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
const API = 'http://localhost:8080';

async function logout() {
    await fetch(`${API}/logout`, { method: 'POST', credentials: 'include' });
    window.location.href = '../login.html';
}

async function loadAnalytics() {
    try {
        const res = await fetch(`${API}/admin/analytics`, { credentials: 'include' });
        if (res.status === 401 || res.status === 403) { window.location.href = '../login.html'; return; }
        const data = await res.json();
        const tbody = document.getElementById('analyticsRows');
        if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="8">No data found.</td></tr>'; return; }
        tbody.innerHTML = data.map(d => `
            <tr>
                <td>${d.id}</td>
                <td>${d.userId || '-'}</td>
                <td>${d.source}</td>
                <td>${(d.energyProduced||0).toFixed(2)}</td>
                <td>${(d.energyConsumed||0).toFixed(2)}</td>
                <td>${(d.efficiency||0).toFixed(2)}%</td>
                <td>₹${(d.electricityBill||0).toFixed(2)}</td>
                <td>${d.entryDate || '-'}</td>
            </tr>`).join('');
    } catch(e) { console.error(e); }
}

async function updateData() {
    const id = document.getElementById('updateId').value;
    const produced = document.getElementById('updateProduced').value;
    const consumed = document.getElementById('updateConsumed').value;
    if (!id || !produced || !consumed) { alert('Fill all fields'); return; }
    try {
        const res = await fetch(`${API}/admin/update-data`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ id, produced, consumed })
        });
        const data = await res.json();
        alert(data.message || 'Updated!');
        loadAnalytics();
    } catch(e) { alert('Error updating'); }
}

loadAnalytics();
</script>
</body>
</html>
