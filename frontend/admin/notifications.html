<!DOCTYPE html>
<html>
<head>
    <title>Send Notifications - REPM Admin</title>
    <meta charset="UTF-8">
    <style>
        body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#e0f7fa; display:flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 220px; background: #1e3c72; color: white; display: flex; flex-direction: column; padding: 20px 0; position: fixed; height: 100%; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; font-size: 24px; }
        .sidebar a { color: white; padding: 15px 25px; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.1); border-left: 4px solid #fff; }
        
        .main { margin-left: 220px; padding: 40px; flex: 1; }
        
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card-header { display: flex; items-center: center; gap: 10px; margin-bottom: 25px; }
        .card-header h2 { margin: 0; color: #1e3c72; font-size: 20px; }
        
        .form-row { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 13px; font-weight: bold; color: #555; }
        .input-group input, .input-group select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #f8f9fa; min-width: 150px; }
        .input-group input:focus { outline: none; border-color: #1e3c72; }
        
        .btn-send { background: #1e3c72; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; margin-left: auto; }
        .btn-send:hover { background: #2a5298; transform: translateY(-2px); }
        
        .logout-btn { margin-top: auto; background: #d32f2f; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>⚡ REPM</h2>
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="analytics.html">📊 Analytics</a>
    <a href="users.html">👥 Users</a>
    <a href="leaderboard.html">🏆 Leaderboard</a>
    <a href="notifications.html" class="active">🔔 Notifications</a>
    <a href="settings.html">⚙ Settings</a>
    <a href="#" onclick="logout()" class="logout-btn">🚪 Logout</a>
</div>

<div class="main">
    <div class="card">
        <div class="card-header">
            <span>📢</span>
            <h2>Send Notification to User</h2>
        </div>
        
        <div class="form-row">
            <div class="input-group">
                <label>User ID</label>
                <input type="number" id="userId" placeholder="Enter User ID">
            </div>
            
            <div class="input-group">
                <label>Source</label>
                <select id="source">
                    <option value="Solar">Solar</option>
                    <option value="Wind">Wind</option>
                    <option value="Hydro">Hydro</option>
                    <option value="System">System</option>
                </select>
            </div>
            
            <div class="input-group" style="flex: 1;">
                <label>Message</label>
                <input type="text" id="message" placeholder="Enter details...">
            </div>
            
            <button class="btn-send" onclick="sendNotification()">
                📩 Send
            </button>
        </div>
    </div>
</div>

<script>
const API = 'https://repm-project-production.up.railway.app';

async function logout() {
    await fetch(`${API}/logout`, { credentials: 'include', method: 'POST' });
    window.location.href = '../login.html';
}

async function sendNotification() {
    const userId = document.getElementById('userId').value;
    const source = document.getElementById('source').value;
    const message = document.getElementById('message').value;

    if (!userId || !message) {
        alert("Please fill in User ID and Message");
        return;
    }

    try {
        const res = await fetch(`${API}/admin/notify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ userId, message, source })
        });
        
        if (res.ok) {
            alert("Notification sent successfully!");
            document.getElementById('userId').value = '';
            document.getElementById('message').value = '';
        } else {
            const err = await res.json();
            alert("Error: " + (err.message || "Failed to send"));
        }
    } catch (e) {
        alert("Error connecting to server");
    }
}
</script>

</body>
</html>
