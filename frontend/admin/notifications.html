<!DOCTYPE html>
<html>
<head>
    <title>Notifications - REPM</title>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex h-screen bg-gray-50 dark:bg-gray-900 dark:text-white overflow-hidden text-sm">

    <!-- ===== SIDEBAR ===== -->
    <aside class="w-64 h-screen bg-gradient-to-b from-blue-900 via-blue-800 to-blue-700 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 text-white flex flex-col justify-between shadow-2xl flex-shrink-0 z-50">
        <div class="overflow-y-auto">
            <div class="p-6 border-b border-blue-700/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-400 rounded-xl flex items-center justify-center text-blue-900 font-bold text-lg shadow-lg shadow-yellow-500/20">⚡</div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">REPM</h1>
                        <p class="text-blue-200 text-[10px] uppercase tracking-widest font-bold opacity-70">Energy Monitor</p>
                    </div>
                </div>
            </div>

            <ul class="space-y-1 px-3 py-4">
                <li><a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">🏠 <span>Dashboard</span></a></li>
                <li><a href="analytics.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">📊 <span>Analytics</span></a></li>
                <li><a href="users.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">👥 <span>Users</span></a></li>
                <li><a href="leaderboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">🏆 <span>Leaderboard</span></a></li>
                <li><a href="notifications.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-white/20 font-bold shadow-inner">🔔 <span>Notifications</span></a></li>
                <li><a href="settings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all opacity-80 hover:opacity-100 hover:bg-white/10">⚙️ <span>Settings</span></a></li>
            </ul>
        </div>
        <div class="p-4 border-t border-blue-700/30">
            <button onclick="logout()" class="w-full bg-red-500/80 hover:bg-red-500 py-3 rounded-xl text-center font-bold transition-all shadow-lg shadow-red-900/20">🚪 Logout</button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 px-8 py-4 flex items-center justify-between shadow-sm flex-shrink-0">
            <div>
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-3">
                    <span class="text-yellow-500">🔔</span> Notifications
                </h2>
                <p class="text-sm text-gray-500 dark:text-gray-400">Broadcast updates or alerts to specific users</p>
            </div>
        </header>

        <main class="p-8">
            <div class="bg-white dark:bg-gray-800 p-10 rounded-2xl shadow-sm border dark:border-gray-700">
                <h2 class="text-xl font-bold mb-8 flex items-center gap-3 text-blue-900 dark:text-blue-400">
                    <span class="p-2 bg-blue-100 dark:bg-blue-900/30 rounded-lg">📢</span> 
                    Send Notification to User
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-2">User ID</label>
                        <input type="number" id="userId" placeholder="Enter User ID" class="w-full p-4 bg-gray-50 dark:bg-gray-700 border dark:border-gray-600 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Source</label>
                        <select id="source" class="w-full p-4 bg-gray-50 dark:bg-gray-700 border dark:border-gray-600 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="Solar">Solar</option>
                            <option value="Wind">Wind</option>
                            <option value="Hydro">Hydro</option>
                            <option value="System">System</option>
                        </select>
                    </div>
                    
                    <div class="md:col-span-1">
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Message</label>
                        <input type="text" id="message" placeholder="Enter details..." class="w-full p-4 bg-gray-50 dark:bg-gray-700 border dark:border-gray-600 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    
                    <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl shadow-lg shadow-blue-900/20 transition-all transform hover:-translate-y-1" onclick="sendNotification()">
                        📩 Send Notification
                    </button>
                </div>
            </div>
        </main>
    </div>

<script>
const API = 'https://repm-project-production.up.railway.app';

async function logout() {
    await fetch(`${API}/logout`, { credentials: 'include', method: 'POST' });
    window.location.href = '../login.html';
}

async function sendNotification() {
    const userId = document.getElementById('userId').value;
    const source = document.getElementById('source').value;
    const message = document.getElementById('message').value;

    if (!userId || !message) {
        alert("Please fill in User ID and Message");
        return;
    }

    try {
        const res = await fetch(`${API}/admin/notify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ userId, message, source })
        });
        
        if (res.ok) {
            alert("Notification sent successfully!");
            document.getElementById('userId').value = '';
            document.getElementById('message').value = '';
        } else {
            const err = await res.json();
            alert("Failed to send: " + (err.message || "Unknown error"));
        }
    } catch (e) {
        alert("Error connecting to server");
    }
}
</script>

</body>
</html>
