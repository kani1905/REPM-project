<!DOCTYPE html>
<html lang="en">
<head>
    <title>Forgot Password - REPM</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: #d6f0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #ffffff;
            padding: 48px 44px;
            border-radius: 18px;
            width: 420px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10);
        }
        .icon { text-align: center; font-size: 48px; margin-bottom: 12px; }
        h2 {
            text-align: center;
            color: #1e3c72;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        p.subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .field {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #d0d7de;
            border-radius: 8px;
            font-size: 15px;
            color: #333;
            margin-bottom: 14px;
            font-family: 'Inter', Arial, sans-serif;
            transition: border-color 0.2s;
        }
        .field:focus { outline: none; border-color: #1e3c72; box-shadow: 0 0 0 3px rgba(30,60,114,0.08); }
        .field::placeholder { color: #a0aab4; }
        .btn {
            width: 100%;
            padding: 15px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', Arial, sans-serif;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background: #163061; transform: translateY(-1px); }
        .links { text-align: center; margin-top: 22px; }
        .links a {
            color: #1e3c72; text-decoration: none;
            font-size: 14px; font-weight: 500;
        }
        .links a:hover { text-decoration: underline; }
        .msg {
            padding: 11px 14px; border-radius: 8px;
            font-size: 14px; text-align: center;
            margin-bottom: 14px; display: none; font-weight: 500;
        }
        .msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🔐</div>
    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your username and we'll take you to the reset page.</p>

    <div id="msgBox" class="msg"></div>

    <form id="forgotForm">
        <input class="field" type="text" name="username" id="username" placeholder="Enter your username" required>
        <button class="btn" type="submit" id="submitBtn">Send Reset Link</button>
    </form>

    <div class="links">
        <a href="login.html">← Back to Login</a>
    </div>
</div>

<script>
function showMsg(text, type) {
    const box = document.getElementById('msgBox');
    box.textContent = text;
    box.className = 'msg ' + type;
    box.style.display = 'block';
}

document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const username = document.getElementById('username').value.trim();

    btn.textContent = 'Checking...';
    btn.disabled = true;

    try {
        const res = await fetch('https://repm-project-production.up.railway.app/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username })
        });
        const data = await res.json();
        if (res.ok) {
            showMsg('Username verified! Redirecting to reset page...', 'success');
            setTimeout(() => {
                window.location.href = 'resetpassword.html?username=' + encodeURIComponent(username);
            }, 1000);
        } else {
            showMsg(data.message || 'Username not found', 'error');
            btn.textContent = 'Send Reset Link';
            btn.disabled = false;
        }
    } catch (error) {
        showMsg('Cannot connect to server. Make sure backend is running.', 'error');
        btn.textContent = 'Send Reset Link';
        btn.disabled = false;
    }
});
</script>

</body>
</html>
